name: ci

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.x

      - name: Install tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore src/Candid.Net/Candid.Net.csproj

      - name: Build
        run: dotnet build src/Candid.Net/Candid.Net.csproj --no-restore -c Release

      - name: Restore test dependencies
        run: dotnet restore src/Candid.Net.Test/Candid.Net.Test.csproj

      - name: Build tests
        run: dotnet build src/Candid.Net.Test/Candid.Net.Test.csproj --no-restore -c Release

      - name: Test
        run: dotnet test src/Candid.Net.Test/Candid.Net.Test.csproj --no-restore --no-build -c Release

      - name: Pack
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        run: dotnet pack src/Candid.Net/Candid.Net.csproj --no-build --no-restore -c Release

      - name: Publish to NuGet.org
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push src/Candid.Net/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source "nuget.org"

  alert-on-failure:
    needs: [ci]
    if: ${{ !cancelled() && failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github
      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '16'
      - name: Install dependencies for PagerDuty action
        run: |
          cd .github/actions/pagerduty-alert
          npm install
      - name: Send PagerDuty Alert
        uses: ./.github/actions/pagerduty-alert
        id: pagerduty-alert
        with:
          pagerduty-api-key: "${{ secrets.PAGERDUTY_API_KEY }}"
          pagerduty-service-id:  "${{ secrets.PAGERDUTY_SERVICE_ID }}"
          pagerduty-user-id: "${{ secrets.PAGERDUTY_USER_ID }}"
          pagerduty-user-email: "${{ secrets.PAGERDUTY_USER_EMAIL }}"
